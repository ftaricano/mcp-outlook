version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '07:00'
    open-pull-requests-limit: 5
    groups:
      dev-dependencies:
        dependency-type: development
      graph-sdk:
        patterns:
          - '@microsoft/microsoft-graph-*'
          - '@azure/msal-*'
    ignore:
      # TypeScript majors are held back until @typescript-eslint's peer range
      # (currently >=4.8.4 <6.1.0) catches up. A grouped TS major otherwise breaks
      # the whole dev-dependencies PR with an npm ERESOLVE conflict (see PR #52).
      - dependency-name: typescript
        update-types:
          - version-update:semver-major
    reviewers:
      - ftaricano
    assignees:
      - ftaricano
    labels:
      - dependencies
    commit-message:
      prefix: chore
      include: scope

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    reviewers:
      - ftaricano
    assignees:
      - ftaricano
    labels:
      - dependencies
      - ci
