version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "07:00"
    open-pull-requests-limit: 5
    groups:
      dev-dependencies:
        dependency-type: development
      graph-sdk:
        patterns:
          - "@microsoft/microsoft-graph-*"
          - "@azure/msal-*"
    labels:
      - dependencies
    commit-message:
      prefix: chore
      include: scope

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    labels:
      - dependencies
      - ci
