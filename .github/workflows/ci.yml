name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Lint + Typecheck + Test
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node: [20, 22]

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check
        continue-on-error: true

      - name: Build
        run: npm run build

      - name: Test
        run: npm run test -- --reporter=default

      - name: Smoke test (MCP protocol)
        run: npm run smoke

      - name: Coverage
        if: matrix.node == '20'
        run: npm run test:coverage

      - name: Upload coverage
        if: matrix.node == '20'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

  audit:
    name: Dependency audit (prod only)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      # --ignore-scripts prevents the `prepare` hook (which runs tsc) from
      # executing without devDependencies available, avoiding a false failure.
      - run: npm ci --omit=dev --ignore-scripts
      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high
